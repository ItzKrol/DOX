<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Системное уведомление</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #001a00 0%, #000000 100%);
            color: #00ff41;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: flicker 0.15s infinite;
        }
        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.98; }
            100% { opacity: 1; }
        }
        .container {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #00ff41;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            margin: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
            backdrop-filter: blur(3px);
        }
        .glitch {
            font-size: 2em;
            font-weight: bold;
            text-shadow: 2px 2px 0px #ff00c1, -2px -2px 0px #00ff41;
            animation: glitch 1s infinite;
        }
        @keyframes glitch {
            0% { transform: skew(0deg, 0deg); }
            20% { transform: skew(2deg, 1deg); text-shadow: 3px 1px 0px #ff00c1; }
            40% { transform: skew(-2deg, -1deg); text-shadow: -3px -1px 0px #00ff41; }
            60% { transform: skew(1deg, 2deg); }
            80% { transform: skew(-1deg, -2deg); }
            100% { transform: skew(0deg, 0deg); }
        }
        .data-box {
            background: #000000aa;
            border-left: 4px solid #00ff41;
            padding: 15px;
            margin: 20px 0;
            font-size: 0.9em;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #00ff41;
            animation: scan 2s ease-in-out forwards;
        }
        @keyframes scan {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        button {
            background: #00ff41;
            color: black;
            border: none;
            padding: 12px 24px;
            font-family: monospace;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 5px;
        }
        button:hover {
            background: white;
            box-shadow: 0 0 15px #00ff41;
        }
        .hidden {
            display: none;
        }
        .typewriter {
            overflow: hidden;
            border-right: 2px solid #00ff41;
            white-space: nowrap;
            animation: typing 3s steps(40, end);
        }
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container" id="mainContainer">
    <div class="glitch">  ОБНАРУЖИНА УЯЗВИМОСТЬ </div>

    <div id="scanPhase">
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div id="scanText" class="typewriter">Сканирование устройства...</div>
    </div>

    <div id="dataPhase" class="hidden">
        <div class="data-box" id="infoBox"></div>
        <div id="warningText"></div>
        <button onclick="finishPrank()"> ВЫЙТИ</button>
    </div>
</div>

<script>
    setTimeout(() => {
        document.getElementById('scanPhase').style.display = 'none';
        document.getElementById('dataPhase').classList.remove('hidden');

        let data = {
            "IP-адрес (локальный)": " 26.61.99.249 ",
            "Браузер": navigator.userAgent,
            "Операционная система": navigator.platform,
            "Разрешение экрана": `${screen.width} x ${screen.height}`,
            "Глубина цвета": screen.colorDepth + " бит",
            "Язык системы": navigator.language,
            "Часовой пояс": Intl.DateTimeFormat().resolvedOptions().timeZone,
            "Поддержка WebGL": (() => { try { return !!document.createElement('canvas').getContext('webgl'); } catch(e) { return false; } })(),
            "Трекеры (найдено)": Math.floor(Math.random() * 50) + 5,
            "Уязвимых портов": Math.floor(Math.random() * 3) + 1
        };

        let html = '<strong> СБОР ДАННЫХ ЗАВЕРШЁН:</strong><br><br>';
        for (let [key, value] of Object.entries(data)) {
            html += `<span style="color:#ffaa00;">${key}:</span> ${value}<br>`;
        }
        html += '<br><span style="color:red;"> Эти данные были бы отправлены в полицию, НО...</span>';

        document.getElementById('infoBox').innerHTML = html;
        document.getElementById('warningText').innerHTML = '<br><strong style="color:cyan;">все жди сват и спортиков тупой троль.</strong><br><br>';
    }, 2800);

    function finishPrank() {
        document.body.innerHTML = `
            <div style="background:white; color:black; font-family:Arial; text-align:center; padding:50px;">
                <h1>все твои данные утекли в полицию тебя посадят!</h1>
                <p>к тебе уже выехал наряд.</p>
                <p>тебе хана. с любовью бывший.</p>
                <button onclick="location.reload()"> Перезапустить</button>
            </div>
        `;
    }
</script>
</body>
</html>
